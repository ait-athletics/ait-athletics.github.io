<style>
  /* =========================================================
     【この記事専用スタイル】メイン画像4枚の「カルーセル」表示（キャプション付き）
     ・写真3枚以上のため判定ルールによりカルーセル。記事ページ内に完結。
       グローバルの css/style.css・js/main.js には手を加えていません。
     ・操作ボタン（矢印・ドット）は写真の下の操作バー .nc-controls にまとめ、
       写真には重ねない。スワイプ／キーボード←→ にも対応。
     ・縦横混在でも見やすいよう、写真は中央寄せ＋最大高さを制限（縦長対策）。
     ・クラス名は衝突回避のため .news-carousel / .nc-* に統一。
     【調整】--nc-max＝カルーセルの最大幅 ／ --nc-maxh＝写真の最大高さ
     ========================================================= */
  .news-carousel{
    --nc-max:720px;              /* 【調整】カルーセルの最大横幅 */
    --nc-maxh:70vh;              /* 【調整】写真の最大高さ（縦長が大きくなりすぎないように） */
    max-width:var(--nc-max);
    margin:0 auto 8px;           /* 中央揃え */
  }
  .nc-viewport{
    overflow:hidden;
    border-radius:10px;
  }
  .nc-track{
    display:flex;
    align-items:center;
    transition:transform .35s ease;
    will-change:transform;
  }
  .nc-slide{
    flex:0 0 100%;
    margin:0;
    display:flex;
    align-items:center;
    justify-content:center;      /* 写真を中央寄せ（縦長時も中央） */
  }
  .nc-img{
    display:block;
    max-width:100%;
    max-height:var(--nc-maxh);
    border-radius:10px;
  }
  /* キャプション（スライドに応じて切り替え） */
  .nc-cap{
    text-align:center;
    font-size:13px;
    color:#6B7280;
    margin:8px 0 0;
  }
  /* 操作バー（写真の下・重ねない）：矢印 ─ ドット ─ 矢印 を中央に */
  .nc-controls{
    display:flex;align-items:center;justify-content:center;gap:14px;
    margin-top:8px;
  }
  .nc-arrow{
    flex:0 0 auto;
    width:44px;height:44px;
    border:none;border-radius:50%;
    background:rgba(75,20,145,0.55);
    color:#fff;font-size:26px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    touch-action:manipulation;
  }
  @media (hover:hover) and (pointer:fine){
    .nc-arrow:hover{ background:rgba(75,20,145,0.78); }
  }
  .nc-dots{
    display:flex;align-items:center;gap:10px;
  }
  .nc-dot{
    position:relative;
    width:10px;height:10px;padding:0;
    border:none;border-radius:50%;
    background:#D1D5DB;cursor:pointer;
    touch-action:manipulation;
  }
  .nc-dot.is-active{ background:#6D28D9; }
  .nc-dot::before{
    content:"";position:absolute;top:-14px;left:-14px;right:-14px;bottom:-14px;
  }
  @media (prefers-reduced-motion: reduce){
    .nc-track{ transition:none; }
  }
</style>
</head>

<!-- ===== カルーセル動作（この記事ページ内に限定・グローバルJSは変更なし）===== -->
<script>
(function(){
  var carousel = document.querySelector('.news-carousel');
  if(!carousel){ return; }
  var track  = carousel.querySelector('.nc-track');
  var slides = carousel.querySelectorAll('.nc-slide');
  var dots   = carousel.querySelectorAll('.nc-dot');
  var capEl  = carousel.querySelector('.nc-cap');
  var caps   = ['中村くん', '伊藤くん', '小栗くん', '宮田くん'];   /* 【調整】各スライドのキャプション */
  var count  = slides.length;
  var idx    = 0;

  function go(n){
    idx = (n + count) % count;
    track.style.transform = 'translateX(' + (-idx * 100) + '%)';
    for(var i = 0; i < dots.length; i++){
      dots[i].classList.toggle('is-active', i === idx);
    }
    if(capEl){ capEl.textContent = caps[idx] || ''; }
  }

  var prev = carousel.querySelector('.nc-prev');
  var next = carousel.querySelector('.nc-next');
  if(prev){ prev.addEventListener('click', function(){ go(idx - 1); }); }
  if(next){ next.addEventListener('click', function(){ go(idx + 1); }); }
  for(var d = 0; d < dots.length; d++){
    (function(i){ dots[i].addEventListener('click', function(){ go(i); }); })(d);
  }

  /* キーボード（←→） */
  carousel.addEventListener('keydown', function(e){
    if(e.key === 'ArrowLeft'){ go(idx - 1); }
    else if(e.key === 'ArrowRight'){ go(idx + 1); }
  });

  /* スワイプ（タッチ）：横移動が縦移動より大きいときのみ切替 */
  var startX = null, startY = null, dx = 0, dy = 0;
  var vp = carousel.querySelector('.nc-viewport');
  vp.addEventListener('touchstart', function(e){ startX = e.touches[0].clientX; startY = e.touches[0].clientY; dx = 0; dy = 0; }, {passive:true});
  vp.addEventListener('touchmove',  function(e){ if(startX !== null){ dx = e.touches[0].clientX - startX; dy = e.touches[0].clientY - startY; } }, {passive:true});
  vp.addEventListener('touchend',   function(){
    if(startX !== null){
      if(Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)){
        if(dx < 0){ go(idx + 1); } else { go(idx - 1); }
      }
      startX = null; startY = null; dx = 0; dy = 0;
    }
  });

  go(0);
})();
</script>

<script src="/js/layout.js"></script>
<script src="/js/main.js"></script>
